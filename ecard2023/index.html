<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Document</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;400;600&display=swap');

            * {
                margin: 0;
                padding: 0;
            }
            p {
                font-family: 'Noto Sans TC', sans-serif;
            }
            body {
                background-color: black;
            }
            .wrapper {
                width: 100vw;
                height: 100vh;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-content: center;
            }
            .card {
                box-sizing: border-box;
                width: min(85vw, 85vh, 320px);
                height: min(85vw, 85vh, 320px);
                color: #ddd;
                background: black;
                padding: 8px;
                display: flex;
                flex-wrap: wrap;
                flex-direction: column;
                justify-content: center;
                align-content: center;
                border: 1px solid #888;
            }
            .card > p {
                margin: 0.5rem;
            }
            .title,
            .sign {
                font-weight: 100;
                font-size: 0.75rem;
            }
            .sign {
                text-align: right;
            }
            .content {
                font-weight: 600;
                background-color: #ffb199;
                background-image: radial-gradient(
                        at 41% 6%,
                        hsla(218, 63%, 63%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 7% 58%,
                        hsla(38, 95%, 64%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 83% 34%,
                        hsla(206, 95%, 64%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 15% 95%,
                        hsla(180, 63%, 62%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 99% 72%,
                        hsla(18, 93%, 72%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 92% 94%,
                        hsla(53, 94%, 77%, 1) 0px,
                        transparent 50%
                    ),
                    radial-gradient(
                        at 28% 71%,
                        hsla(60, 62%, 63%, 1) 0px,
                        transparent 50%
                    );
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: content-flow 2s ease-in-out 0s infinite
                    alternate-reverse;
            }
            @keyframes content-flow {
                from {
                    opacity: 0.7;
                }
                to {
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="card">
                <p class="title">To. 俊龍：</p>
                <p class="content">
                    生日快樂！生日代表又長大了一歲，希望你也能成為更成熟的人，找到未來的目標，並好好往這個方向前進。Stay
                    hungry, stay foolish.
                    不斷地虛心學習，相信你一定也能夠讓自己不斷的成長，一起加油！
                </p>
                <p class="sign">峮驊 2023-11-20</p>
            </div>
        </div>
    </body>
</html>
