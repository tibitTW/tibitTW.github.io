    <script>
        var remaining_value = 10

        updateRemainingValue = () => {
            remaining_value = 10
            for (var i = 1; i <= 8; i++) {
                var radios = document.forms['main-form'].elements[`q1_${i}`]
                remaining_value -= radios.value
            }
        }

        updateAvailableOptions = () => {
            for (var i = 1; i <= 8; i++) {
                var radios = document.forms['main-form'].elements[`q1_${i}`]

                var max_available_option = remaining_value + +radios.value
                console.log(i, max_available_option)
                for (var ri = 0, max = radios.length; ri < max; ri++) {
                    if (ri <= max_available_option) {
                        radios[ri].disabled = false
                    } else {
                        radios[ri].disabled = true
                    }
                }
            }
        }

        for (var i = 1; i <= 8; i++) {
            var radios = document.forms['main-form'].elements[`q1_${i}`]
            for (radio in radios) {
                radios[radio].onclick = function () {
                    console.log(this.value)
                    updateRemainingValue()
                    console.log({ remaining_value })
                    updateAvailableOptions()
                }
            }
        }
