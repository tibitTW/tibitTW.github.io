<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>誰沒回報!!</title>
        <style>
            .LINE-text-area {
                font-size: 0.8rem;
                width: 90vw;
            }
            .submit-btn {
                font-size: 1rem;
            }
        </style>
    </head>
    <body>
        <p>👇貼上賴訊息👇</p>
        <textarea name="LINE-text" id="" rows="30" class="LINE-text-area"></textarea>
        <p></p>
        <button class="submit-btn">看誰沒回報🤔</button>
        <p class="output-textarea"></p>
    </body>
</html>
<script>
    var name_list = [
        '育萱',
        '書羽',
        '宜潔',
        '建元',
        '維慶',
        '建勳',
        '峮驊',
        '祐聖',
        '艾霓',
        '佳惠',
        '心妤',
        '育婷',
        '涴喻',
        '華芳',
        '鉞淵',
        '慈志',
        '泰晉',
        // '昕彥',
    ]
    var check_list = new Array(name_list.length).fill(0)
    var line_text_area = document.querySelector('.LINE-text-area')
    document.querySelector('.submit-btn').addEventListener('click', (e) => {
        var line_text_arr = line_text_area.value.split(/[0-9]{2}:[0-9]{2} /)
        for (var i = 0; i < line_text_arr.length; i++) {
            // console.log(line_text_arr[i])
            aline = line_text_arr[i].split('\n')
            name_line = aline[0] + ' ' + aline[1]
            console.log(name_line)
            if (name_line.includes('one piece') || name_line.includes('編號')) {
                for (var ni = 0; ni < name_list.length; ni++) {
                    if (name_line.includes(name_list[ni])) {
                        console.log('name', name_list[ni])
                        check_list[ni] = 1
                    }
                }
            }
        }
        var output_text_arr = ['👉']
        for (var ni = 0; ni < name_list.length; ni++) {
            if (!check_list[ni]) {
                output_text_arr.push(name_list[ni])
            }
        }
        document.querySelector('.output-textarea').textContent = output_text_arr.length - 1 + '人 ' + output_text_arr.join(' ')
    })
</script>
